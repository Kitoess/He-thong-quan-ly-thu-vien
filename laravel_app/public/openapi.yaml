  /api/books:
    get:
      tags: [Books]
      summary: Danh sách sách
      parameters:
        - in: query
          name: search
          schema: { type: string, maxLength: 200 }
          description: Từ khóa tìm kiếm chung (mã sách, tên sách, tác giả, trạng thái)
        - in: query
          name: maSach
          schema: { type: string, maxLength: 20 }
          description: Tìm gần đúng theo mã sách
        - in: query
          name: tenSach
          schema: { type: string, maxLength: 200 }
          description: Tìm gần đúng theo tên sách
        - in: query
          name: tacGia
          schema: { type: string, maxLength: 100 }
          description: Tìm gần đúng theo tên tác giả
        - in: query
          name: trangThai
          schema:
            type: string
            enum: [Còn, Hết]
          description: Lọc theo trạng thái sách
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedResponse' }
        '422':
          description: Dữ liệu tìm kiếm không hợp lệ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Không thể tải danh sách sách hoặc tìm kiếm thất bại
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      tags: [Books]
      summary: Tạo sách
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookInput' }
      responses:
        '201':
          description: Thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
        '422':
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          description: Sai dữ liệu quá số lần cho phép
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

