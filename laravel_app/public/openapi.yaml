          description: Thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
    put:
      tags: [Categories]
      summary: Cập nhật thể loại
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '200':
