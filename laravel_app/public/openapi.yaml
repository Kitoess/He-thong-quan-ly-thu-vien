      parameters:
        - $ref: '#/components/parameters/BorrowId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token

  parameters:
    AuthorId:
      in: path
      name: author
      required: true
      schema: { type: string }
    CategoryId:
      in: path
      name: category
      required: true
      schema: { type: string }
    PublisherId:
      in: path
      name: publisher
      required: true
      schema: { type: string }
    LanguageId:
      in: path
      name: language
      required: true
      schema: { type: string }
    ShelfId:
      in: path
      name: shelf
      required: true
      schema: { type: string }
    BookId:
      in: path
      name: book
      required: true
      schema: { type: string }
    ReaderId:
      in: path
      name: reader
      required: true
      schema: { type: string }
    LibraryCardId:
      in: path
      name: libraryCard
      required: true
      schema: { type: string }
    StaffId:
      in: path
      name: staff
      required: true
      schema: { type: string }
    BorrowId:
      in: path
      name: borrow
      required: true
      schema: { type: string }

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Thành công
        data:
          nullable: true
          oneOf:
            - type: object
            - type: array
              items: {}

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Có lỗi xảy ra
        errors:
          type: object
          additionalProperties: true

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Thành công
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          properties:
            current_page: { type: integer, example: 1 }
            last_page: { type: integer, example: 5 }
            per_page: { type: integer, example: 10 }
            total: { type: integer, example: 45 }

    LoginSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Đăng nhập thành công.
        data:
          type: object
          properties:
            access_token:
              type: string
            token_type:
              type: string
              example: Bearer
            expires_at:
              type: string
              format: date-time
            user:
              type: object
              properties:
                maNV: { type: string, example: NV01 }
                tenNV: { type: string, example: Admin }
                tenDangNhap: { type: string, example: admin }
                vaitro: { type: string, example: Quản lý thư viện }
                trangThaiTK: { type: string, example: Đang hoạt động }

    AuthorInput:
      type: object
      required: [tenTG, quocTich]
      properties:
        tenTG: { type: string, maxLength: 100 }
        namSinh: { type: string, format: date }
        gioiTinh:
          type: string
          enum: [Nam, 'Nữ']
        quocTich: { type: string, maxLength: 50 }
        moTa: { type: string, maxLength: 255 }

    CategoryInput:
      type: object
      required: [tenTL]
      properties:
        tenTL: { type: string, maxLength: 100 }

    PublisherInput:
      type: object
      required: [tenNXB, diaChi, soDT, email]
      properties:
        tenNXB: { type: string, maxLength: 100 }
        diaChi: { type: string, maxLength: 255 }
        soDT: { type: string, example: '0901234567' }
        email: { type: string, format: email }

    LanguageInput:
      type: object
      required: [tenNN]
      properties:
        tenNN: { type: string, maxLength: 50 }

    ShelfInput:
      type: object
      required: [tenKS]
      properties:
        tenKS: { type: string, maxLength: 50 }

    BookInput:
      type: object
      required: [tenSach, maTG, maNXB, maTL, maNN, maKS, namXB, soLuong]
      properties:
        tenSach: { type: string, maxLength: 200 }
        maTG: { type: string }
        maNXB: { type: string }
        maTL: { type: string }
        maNN: { type: string }
        maKS: { type: string }
        namXB: { type: integer, example: 2024 }
        soLuong: { type: integer, minimum: 1 }
        moTa: { type: string, maxLength: 255 }

    ReaderInput:
      type: object
      required: [tenDG, ngaySinh, gioiTinh, diaChi, soDT, email]
      properties:
        tenDG: { type: string, maxLength: 100 }
        ngaySinh: { type: string, format: date }
        gioiTinh:
          type: string
          enum: [Nam, 'Nữ']
        diaChi: { type: string, maxLength: 255 }
        soDT: { type: string, example: '0912345678' }
        email: { type: string, format: email }

    LibraryCardInput:
      type: object
      required: [maDG, ngayCap, ngayHetHan]
      properties:
        maDG: { type: string }
        ngayCap: { type: string, format: date }
        ngayHetHan: { type: string, format: date }

    StaffInput:
      type: object
      required: [tenNV, ngaySinh, diaChi, gioiTinh, soDT, email, vaitro, tenDangNhap]
      properties:
        tenNV: { type: string, maxLength: 100 }
        ngaySinh: { type: string, format: date }
        diaChi: { type: string, maxLength: 255 }
        gioiTinh:
          type: string
          enum: [Nam, 'Nữ']
        soDT: { type: string }
        email: { type: string, format: email }
        vaitro:
          type: string
          enum: ['Quản lý thư viện', 'Thủ thư']
        trangThaiTK:
          type: string
          enum: ['Đang hoạt động', 'Bị khóa', 'Chờ kích hoạt']
        tenDangNhap: { type: string, maxLength: 50 }
        matKhau:
          type: string
          format: password
          minLength: 6

    BorrowInput:
      type: object
      required: [maDG, ngayMuon, hanTra, books]
      properties:
        maDG: { type: string }
        ngayMuon: { type: string, format: date }
        hanTra: { type: string, format: date }
        books:
          type: array
          minItems: 1
          items:
            type: object
            required: [maSach, soLuong]
            properties:
              maSach: { type: string }
              soLuong: { type: integer, minimum: 1 }
