openapi: 3.0.3
info:
  title: Library Management API
  version: 1.0.0
  description: API cho hệ thống quản lý thư viện (Laravel)
servers:
  - url: http://127.0.0.1:8000
    description: Local server
tags:
  - name: Auth
  - name: Dashboard
  - name: Authors
  - name: Categories
  - name: Publishers
  - name: Languages
  - name: Shelves
  - name: Books
  - name: Readers
  - name: LibraryCards
  - name: Staffs
  - name: Borrows
security:
  - bearerAuth: []
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenDangNhap, matKhau]
              properties:
                tenDangNhap:
                  type: string
                  example: admin
                matKhau:
                  type: string
                  format: password
                  example: '123456'
                remember_me:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
        '401':
          description: Sai tài khoản hoặc mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: Tài khoản bị khóa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Quá nhiều lần đăng nhập sai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Lấy thông tin người dùng hiện tại
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất API (hủy token hiện tại)
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Lấy số liệu dashboard
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/authors:
    get:
      tags: [Authors]
      summary: Danh sách tác giả
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: per_page
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Authors]
      summary: Tạo tác giả
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/authors/{author}:
    get:
      tags: [Authors]
      summary: Chi tiết tác giả
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    put:
      tags: [Authors]
      summary: Cập nhật tác giả
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Authors]
      summary: Xóa tác giả
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          description: Xóa thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /api/categories:
    get:
      tags: [Categories]
      summary: Danh sách thể loại
      parameters:
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedResponse' }
    post:
      tags: [Categories]
      summary: Tạo thể loại
      requestBody:
